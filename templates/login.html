<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Login - Sangchen College</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center;
        }
        .college-logo { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; }
        .btn-login { background: #2c3e50; color: white; border: none; transition: 0.3s; }
        .btn-login:hover { background: #1a252f; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="College Logo" class="college-logo">
        <h4 class="fw-bold text-secondary mb-2">Teacher Login</h4>
        <p class="text-muted small mb-4">Sangchen Dorji Lhundrup Nuns' Buddhist College</p>
        
        <div id="loginError" class="alert alert-danger d-none" style="font-size: 0.85rem;"></div>

        <div class="text-start">
            <label class="form-label small fw-bold">Teacher Name</label>
            <input type="text" id="username" class="form-control mb-3" placeholder="Enter your name">
            
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="password" class="form-control mb-4" placeholder="Password ">
        </div>

        <button onclick="attemptLogin()" id="loginBtn" class="btn btn-login w-100 py-2 fw-bold shadow-sm">Sign In</button>
    </div>

    <script>
        function attemptLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            if(!u || !p) {
                err.innerText = "Please fill in all fields";
                err.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";

            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            const headers = {'Content-Type': 'application/json'};
            if (csrfToken) headers['X-CSRFToken'] = csrfToken;
            fetch('/login', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({username: u, password: p})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    window.location.href = '/'; // Redirect to main dashboard
                } else {
                    err.innerText = data.message;
                    err.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerText = "Sign In";
                }
            })
            .catch(() => {
                err.innerText = "Error: Auth Service is Offline";
                err.classList.remove('d-none');
                btn.disabled = false;
                btn.innerText = "Sign In";
            });
        }

        // Allow pressing "Enter" to login
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') attemptLogin();
        });
    </script>
</body>
</html>
