<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Dashboard - Sangchen nunnery</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.jpg') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #2c3e50; --accent-blue: #3498db; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Sidebar Styles */
        .sidebar { 
            width: 260px; height: 100vh; background: var(--primary-dark); color: white; 
            position: fixed; left: 0; top: 0; padding: 20px; z-index: 1000; transition: 0.3s;
        }
        .nav-link { color: #bdc3c7; padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; text-decoration: none; display: block; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; }
        
        /* Backdrop Overlay for Mobile */
        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .content-area { margin-left: 260px; padding: 40px; transition: 0.3s; }
        .main-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; }
        
        .table-scroll { max-height: 65vh; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        
        .sticky-thead th { 
            position: sticky; top: 0; z-index: 10; 
            background: #212529 !important; color: #ffffff !important; 
            border: 1px solid #444; text-align: center; vertical-align: middle;
        }

        #mobile-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 1100; background: var(--primary-dark); color: white; border: none; padding: 8px 15px; border-radius: 5px; }
        
        #takeAttendanceContainer { display: none; }

        @media (max-width: 750px) {
            #mobile-toggle { display: block; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .content-area { margin-left: 0; padding: 15px; padding-top: 70px; }
            #sidebar-overlay.show { display: block; }

            /* Vertical stacking for Subject and Save Button */
            .d-flex.justify-content-between.align-items-end {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 15px;
            }
            .w-50 { width: 100% !important; }
        }

        @media print {
            .sidebar, #mobile-toggle, .no-print, .btn, .btn-outline-primary, hr, #sidebar-overlay { display: none !important; }
            .content-area { margin: 0 !important; padding: 0 !important; margin-left: 0 !important; }
            .main-card { box-shadow: none !important; border: none !important; padding: 0 !important; }
            .table-scroll { max-height: none !important; overflow: visible !important; }
            .sticky-thead th { position: static !important; background-color: #f2f2f2 !important; color: black !important; border: 1px solid #000 !important; }
            table { width: 100% !important; border-collapse: collapse !important; table-layout: auto !important; }
            td { border: 1px solid #000 !important; color: black !important; padding: 6px !important; }
        }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <button id="mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar" aria-controls="sidebar" aria-expanded="false"><i class="bi bi-list"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" style="width: 70px; height: 70px; border-radius: 50%; background: white; padding: 3px; margin-bottom: 10px;">
            <h5 class="fw-bold text-white">གསང་ཆེན་རྡོ་རྗེ་ལྷུན་གྲུབ་བཙུན་མའི་མཐོ་རིམ་བཤད་གྲྭ།</h5>
            <hr class="opacity-25">
            <p class="text-info mb-0">སྐུ་གཟུགས་བཟང་པོ།</p>
            <div class="fw-bold text-white">{{ user_name }}</div>
        </div>

        <div class="nav flex-column">
            <button id="navTake" class="nav-link btn btn-link text-start active" onclick="showMode('take')" type="button" aria-pressed="true"><i class="bi bi-pencil-square me-2"></i> Take Attendance</button>
            <button id="navView" class="nav-link btn btn-link text-start" onclick="showMode('view')" type="button" aria-pressed="false"><i class="bi bi-file-earmark-bar-graph me-2"></i> View Reports</button>
            <!-- <button id="navTimetable" class="nav-link btn btn-link text-start" onclick="showMode('timetable')" type="button" aria-pressed="false"><i class="bi bi-calendar2-week me-2"></i> Time Table</button> -->
            <button id="refresh-cache-btn" class="btn btn-sm btn-outline-secondary no-print mt-2">
                <i class="bi bi-arrow-clockwise"></i> Refresh 
            </button>
            <a href="{{ url_for('logout') }}" class="nav-link text-warning mt-5"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </div>
    </div>

    <div class="content-area">
        <div class="main-card">
            <h4 id="modeTitle" class="mb-4 fw-bold">Daily Attendance Entry</h4>

            <div id="takeSection">
                <div class="row g-3 mb-4 p-3 bg-light rounded border">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Class (སློབ་ཚན།)</label>
                        <select id="className" class="form-select" onchange="fetchSubjects();"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Subject (ཆོས་ཚན།)</label>
                        <select id="actualSubject" class="form-select" onchange="fetchStudents()"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Date (ཚེས་གྲངས།)</label>
                        <input type="date" id="attDate" class="form-control" readonly style="background:#e9ecef;">
                    </div>
                </div>

                <div id="takePlaceholder" class="text-center p-5 text-muted border rounded bg-white">
                    <i class="bi bi-info-circle fs-2"></i>
                    <p class="mt-2">Please select both <b>Class</b> and <b>Subject</b> to start taking attendance.</p>
                </div>

                <div id="takeAttendanceContainer">
                    <div class="table-scroll">
                        <table class="table table-hover align-middle">
                            <thead class="sticky-thead">
                                <tr><th>ཨང་།</th><th>མཚན་ཐོ།</th><th>ཡོད/མེད?</th></tr>
                                
                            </thead>
                            <tbody id="studentList"></tbody>
                        </table>
                    </div>

                    <div class="mt-4 d-flex justify-content-end align-items-end p-3 bg-light rounded border">
                        <button onclick="saveAttendance()" id="saveBtn" class="btn btn-success px-5 fw-bold" disabled>
                            <span id="saveBtnText">Submit Attendance</span>
                            <span id="saveBtnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="timetableSection" style="display: none;">
                
                <div class="border rounded overflow-hidden bg-white" style="height: 75vh;">
                    <iframe src="{{ url_for('static', filename='Sangchen Dorji Lhundrup Nunnery Time Table.pdf') }}" class="w-100 h-100" title="Timetable PDF"></iframe>
                </div>
            </div>

            <div id="viewSection" style="display: none;">
                <div class="d-flex mb-3 no-print">
                    <button id="btnDailyView" class="btn btn-sm btn-outline-primary active me-2" onclick="showReportType('daily')">Daily View</button>
                    <button id="btnMonthlyView" class="btn btn-sm btn-outline-primary me-2" onclick="showReportType('monthly')">Monthly Summary</button>
                    <button id="btnSubjectView" class="btn btn-sm btn-outline-primary" onclick="showReportType('subject')">By Subject</button>
                </div>

                <div id="subjectSubToggle" class="mb-3 no-print d-none">
                    <div class="btn-group" role="group" aria-label="Subject view toggle">
                        <button id="btnSubjectSubSummary" type="button" class="btn btn-sm btn-outline-secondary active" onclick="setSubjectViewMode('summary')">Summary</button>
                        <button id="btnSubjectSubDatewise" type="button" class="btn btn-sm btn-outline-secondary" onclick="setSubjectViewMode('datewise')">Date-wise</button>
                    </div>
                </div>

                <div class="row g-2 mb-4 p-3 bg-light rounded border align-items-end no-print">
                    <div class="col-md-3">
                        <label class="form-label fw-bold small">Class (སློབ་ཚན།)</label>
                        <select id="viewClass" class="form-select"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold small">Teacher (སློབ་དཔོན།)</label>
                        <select id="viewTeacher" class="form-select"></select>
                    </div>
                    <div class="col-md-3 d-none" id="subjectFilterContainer">
                        <label class="form-label fw-bold small">Subject (ཆོས་ཚན།)</label>
                        <select id="viewSubject" class="form-select"></select>
                    </div>
                    <div class="col-md-3">
                        <label id="dateLabel" class="form-label fw-bold small">Select Date (ཚེས་གྲངས།)</label>
                        <input type="date" id="reportDate" class="form-control">
                        <input type="month" id="reportMonth" class="form-control d-none">
                    </div>
                    <div class="col-md-3">
                        <button onclick="generateReport()" class="btn btn-primary w-100 fw-bold shadow-sm">
                            <i class="bi bi-search me-1"></i> Generate
                        </button>
                    </div>
                </div>

                <div id="reportHeaderInfo" class="text-center mb-4" style="display:none;">
                    <h5 id="displayTeacher" class="fw-bold text-primary"></h5>
                    <p id="displayMeta" class="text-muted small"></p>
                    <button onclick="window.print()" class="btn btn-sm btn-outline-danger no-print"><i class="bi bi-printer"></i> Print PDF</button>
                </div>

                <div class="table-scroll">
                    <table class="table table-bordered align-middle bg-white">
                        <thead class="sticky-thead"></thead>
                        <tbody id="reportList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let reportType = 'daily';
        let subjectViewMode = 'summary'; // 'summary' | 'datewise'
        // Global headers for AJAX requests (available to all functions)
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
        const defaultHeaders = { 'X-Requested-With': 'XMLHttpRequest' };
        if (csrfToken) defaultHeaders['X-CSRFToken'] = csrfToken;

        // Toggle logic for Sidebar and Backdrop
        function toggleSidebar() { 
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const toggleBtn = document.getElementById('mobile-toggle');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            if (toggleBtn) {
                const expanded = sidebar.classList.contains('open');
                toggleBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
            }
        }

        // Switch modes and auto-close sidebar on mobile
        function showMode(mode) {
            try { localStorage.setItem('attendance_app_mode', mode); } catch (e) {}
            document.getElementById('takeSection').style.display = mode === 'take' ? 'block' : 'none';
            document.getElementById('viewSection').style.display = mode === 'view' ? 'block' : 'none';
            document.getElementById('timetableSection').style.display = mode === 'timetable' ? 'block' : 'none';
            document.getElementById('navTake').classList.toggle('active', mode === 'take');
            document.getElementById('navView').classList.toggle('active', mode === 'view');
            const navTimetable = document.getElementById('navTimetable');
            if (navTimetable) {
                navTimetable.classList.toggle('active', mode === 'timetable');
            }
            document.getElementById('navTake').setAttribute('aria-pressed', mode === 'take');
            document.getElementById('navView').setAttribute('aria-pressed', mode === 'view');
            if (navTimetable) {
                navTimetable.setAttribute('aria-pressed', mode === 'timetable');
            }
            document.getElementById('modeTitle').innerText = 
                mode === 'take' ? 'Daily Attendance Entry' : 
                mode === 'view' ? 'Attendance Records' : 'Sangchen Dorji Lhundrup Nunnery Time Table - 2026';

            // Auto-close on small screens
            if (window.innerWidth <= 750) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if (sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                }
            }
        }

        document.getElementById('refresh-cache-btn').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Refreshing...';
            btn.disabled = true;

            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            const headers = { 'X-Requested-With': 'XMLHttpRequest' };
            if (csrfToken) headers['X-CSRFToken'] = csrfToken;

            fetch('/clear_cache', { headers })
                .then(response => response.json())
                .then(data => {
                    alert("Success: The local cache is cleared.");
                    // Reload so all dropdowns/data are fetched fresh
                    window.location.reload();
                })
                .catch(error => {
                    alert("Failed to clear cache.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        });

        function showReportType(type) {
            reportType = type;
            document.getElementById('btnDailyView').classList.toggle('active', type === 'daily');
            document.getElementById('btnMonthlyView').classList.toggle('active', type === 'monthly');
            document.getElementById('btnSubjectView').classList.toggle('active', type === 'subject');

            // Subject sub-toggle visibility
            const subjectToggle = document.getElementById('subjectSubToggle');
            if (subjectToggle) subjectToggle.classList.toggle('d-none', type !== 'subject');

            // Date label and inputs
            document.getElementById('reportDate').classList.toggle('d-none', type !== 'daily');
            document.getElementById('reportMonth').classList.toggle('d-none', type === 'daily');
            document.getElementById('dateLabel').innerText = type === 'daily' ? 'Select Date' : 'Select Month';

           
            // Show subject filter only for 'subject' view
            const subjContainer = document.getElementById('subjectFilterContainer');
            const teacherContainer = document.getElementById('viewTeacher')?.parentElement;
            if (type === 'subject') {
                subjContainer.classList.remove('d-none');
                // hide the teacher dropdown when viewing by subject (filter by class+subject only)
                if (teacherContainer) teacherContainer.classList.add('d-none');
            } else {
                subjContainer.classList.add('d-none');
                if (teacherContainer) teacherContainer.classList.remove('d-none');
            }

            // Reset filters and results
            document.getElementById('viewClass').value = "";
            document.getElementById('viewTeacher').value = "";
            document.getElementById('viewSubject').innerHTML = '';
            document.querySelector("#viewSection table thead").innerHTML = "";
            document.getElementById('reportList').innerHTML = '<tr><td colspan="10" class="text-center p-5 text-muted">Select filters and click Generate</td></tr>';
            document.getElementById('reportHeaderInfo').style.display = 'none';
        }

        function setSubjectViewMode(mode) {
            subjectViewMode = mode === 'datewise' ? 'datewise' : 'summary';
            document.getElementById('btnSubjectSubSummary')?.classList.toggle('active', subjectViewMode === 'summary');
            document.getElementById('btnSubjectSubDatewise')?.classList.toggle('active', subjectViewMode === 'datewise');
            // Reset to defaults when switching internal toggle
            document.getElementById('viewClass').value = "";
            document.getElementById('viewSubject').innerHTML = '<option value="">-- Select Subject --</option>';
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('reportMonth').value = `${yyyy}-${mm}`;

            // Clear previous result table
            document.querySelector("#viewSection table thead").innerHTML = "";
            document.getElementById('reportList').innerHTML = '<tr><td colspan="10" class="text-center p-5 text-muted">Select filters and click Generate</td></tr>';
            document.getElementById('reportHeaderInfo').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Use local time (not UTC) so late-night times don't show yesterday's date
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const today = `${yyyy}-${mm}-${dd}`;
            document.getElementById('attDate').value = today;
            document.getElementById('reportDate').value = today;
            document.getElementById('reportMonth').value = `${yyyy}-${mm}`;

            // Restore last sidebar mode after refresh
            let savedMode = 'take';
            try { savedMode = localStorage.getItem('attendance_app_mode') || 'take'; } catch (e) {}
            if (!['take', 'view', 'timetable'].includes(savedMode)) savedMode = 'take';
            showMode(savedMode);

            const defaultHeaders = { 'X-Requested-With': 'XMLHttpRequest' };
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            if (csrfToken) defaultHeaders['X-CSRFToken'] = csrfToken;

            fetch('/get_teachers', { headers: defaultHeaders }).then(res => res.json()).then(data => {
                let h = '<option value="">-- Select Teacher --</option>';
                data.forEach(t => h += `<option value="${t}">${t}</option>`);
                document.getElementById('viewTeacher').innerHTML = h;
            });

            fetch('/get_classes', { headers: defaultHeaders }).then(res => res.json()).then(data => {
                const filtered = data.filter(n => !['Settings', 'Teachers', 'Time_table'].includes(n));
                let h = '<option value="">-- Select Class --</option>';
                filtered.forEach(c => h += `<option value="${c}">${c}</option>`);
                document.getElementById('className').innerHTML = h;
                document.getElementById('viewClass').innerHTML = h;

                // When viewClass changes, populate subjects for subject-report mode
                document.getElementById('viewClass').addEventListener('change', () => {
                    const cls = document.getElementById('viewClass').value;
                    const subjEl = document.getElementById('viewSubject');
                    subjEl.innerHTML = '<option value="">-- Select Subject --</option>';
                    if (!cls) return;
                    fetch(`/get_subjects/${encodeURIComponent(cls)}`, { headers: defaultHeaders })
                        .then(r => r.json()).then(arr => {
                            const list = Array.isArray(arr) ? arr : (arr?.result || arr?.data || arr?.subjects || []);
                            list.forEach(s => subjEl.innerHTML += `<option value="${s}">${s}</option>`);
                        }).catch(()=>{});
                });
            });

        });

        function fetchSubjects() {
            const cls = document.getElementById('className').value;
            const subjectSelect = document.getElementById('actualSubject');
            subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
            subjectSelect.value = '';
            if (!cls) return;
            fetch(`/get_subjects/${encodeURIComponent(cls)}`, { headers: defaultHeaders })
                .then(res => res.json())
                .then(data => {
                    if (document.getElementById('className').value !== cls) return;
                    const arr = Array.isArray(data) ? data : (data?.result || data?.data || data?.subjects || []);
                    if (Array.isArray(arr) && arr.length > 0) {
                        arr.forEach(s => {
                            const val = typeof s === 'string' ? s : (s?.name || s?.subject || String(s));
                            subjectSelect.innerHTML += `<option value="${val}">${val}</option>`;
                        });
                    }
                })
                .catch(() => {});
        }

        
        function fetchStudents() {
            const cls = document.getElementById('className').value;
            const date = document.getElementById('attDate').value;
            
            const container = document.getElementById('takeAttendanceContainer');
            const placeholder = document.getElementById('takePlaceholder');
            const list = document.getElementById('studentList');
            const saveBtn = document.getElementById('saveBtn');

            const subject = document.getElementById('actualSubject').value;

            if (!cls || !subject) {
                container.style.display = 'none';
                placeholder.style.display = 'block';
                return;
            }

            placeholder.style.display = 'none';
            container.style.display = 'block';
            list.innerHTML = '<tr><td colspan="3" class="text-center p-5"><div class="spinner-border text-primary"></div></td></tr>';

            fetch(`/get_students/${cls}?date=${date}&subject=${encodeURIComponent(subject)}`, { headers: defaultHeaders })
            .then(res => res.json())
            .then(data => {
                const isAlreadyTaken = data.already_taken === true || String(data.already_taken).toLowerCase() === 'true';

                if (isAlreadyTaken) {
                    list.innerHTML = `
                        <tr>
                            <td colspan="3" class="text-center p-5 text-danger fw-bold">
                                <i class="bi bi-check-circle-fill fs-3"></i><br>
                                Attendance for this slot has already been saved.
                            </td>
                        </tr>`;
                    saveBtn.disabled = true;
                } 
                else if (data.students && data.students.length > 0) {
                    let h = '';
                    data.students.forEach(s => {
                        h += `<tr>
                            <td class="text-center">${s.ID}</td>
                            <td>${s.Name}</td>
                            <td>
                                <select class="form-select att-val" data-id="${s.ID}">
                                    <option value="Present">✔️ ཡོད</option>
                                    <option value="Absent">❌ ཆ</option>
                                    <option value="Sick">🤒 ན</option>
                                    <option value="Leave">🚗 ཞུ</option>
                                    <option value="Late">⏰ འཕྱིས</option>
                                </select>
                            </td>
                        </tr>`;
                    });
                    list.innerHTML = h;
                    saveBtn.disabled = false;
                } else {
                    list.innerHTML = '<tr><td colspan="3" class="text-center p-5 text-muted">No students found.</td></tr>';
                    saveBtn.disabled = true;
                }
            });
        }




        function saveAttendance() {
            const sub = document.getElementById('actualSubject').value?.trim() || '';
            const saveBtn = document.getElementById('saveBtn');
            if(!sub) return alert("Please select the Subject.");

            saveBtn.disabled = true;
            document.getElementById('saveBtnText').innerText = "Saving...";
            document.getElementById('saveBtnSpinner').classList.remove('d-none');

            // Lock the UI while saving to prevent edits mid-submit
            const lockEls = [
                document.getElementById('className'),
                document.getElementById('actualSubject')
            ];
            lockEls.forEach(el => el.disabled = true);
            document.querySelectorAll('.att-val').forEach(el => el.disabled = true);

            const payload = {
                class_name: document.getElementById('className').value,
                //time_slot: document.getElementById('timeTable').value,
                time_slot: sub,
                actual_subject: sub,
                date: document.getElementById('attDate').value,
                attendance_data: {}
            };
            document.querySelectorAll('.att-val').forEach(el => { payload.attendance_data[String(el.dataset.id)] = el.value; });
            
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            const headers = {'Content-Type': 'application/json'};
            if (csrfToken) headers['X-CSRFToken'] = csrfToken;
            // Add X-Requested-With for consistent AJAX handling on server
            if (!headers['X-Requested-With']) headers['X-Requested-With'] = 'XMLHttpRequest';
            fetch('/save_attendance', { method: 'POST', headers: headers, body: JSON.stringify(payload) })
            .then(async (res) => {
                if (res.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data?.error || 'Failed to save attendance');
                }
                return data;
            })
            .then(data => {
                if (!data) return;
                if (data.error) {
                    throw new Error(data.error);
                }
                alert(data.message || "Attendance saved successfully!");
                location.reload();
            })
            .catch((err) => {
                alert(err?.message || "Failed to save attendance.");
                // Re-enable UI so user can retry
                lockEls.forEach(el => el.disabled = false);
                document.querySelectorAll('.att-val').forEach(el => el.disabled = false);
                saveBtn.disabled = false;
                document.getElementById('saveBtnText').innerText = "Submit Attendance";
                document.getElementById('saveBtnSpinner').classList.add('d-none');
            });
        }

        async function generateReport() {

            const cls = document.getElementById('viewClass').value;
            const teacher = document.getElementById('viewTeacher')?.value;
            const subject = document.getElementById('viewSubject')?.value;

            const dateVal = reportType === 'daily'
                ? document.getElementById('reportDate').value
                : document.getElementById('reportMonth').value;

            const list = document.getElementById('reportList');

            try {

                // =============================
                // VALIDATION
                // =============================

                if (reportType === 'daily') {
                    if (!cls || !teacher || !dateVal) {
                        alert("Please select Class, Teacher and Date.");
                        return;
                    }
                }

                if (reportType === 'monthly') {
                    if (!cls || !teacher || !dateVal) {
                        alert("Please select Class, Teacher and Month.");
                        return;
                    }
                }

                if (reportType === 'subject') {
                    if (!cls || !subject || !dateVal) {
                        alert("Please select Class, Subject and Month.");
                        return;
                    }
                }

                // =============================
                // SHOW LOADING SPINNER
                // =============================

                list.innerHTML = `
                <tr>
                    <td colspan="10" class="text-center p-5">
                        <div class="spinner-border text-primary"></div>
                    </td>
                </tr>
                `;

                // =============================
                // BUILD REQUEST URL
                // =============================

                // For By Subject -> Date-wise, fetch a subject day-grid view from backend
                const effectiveViewType =
                    (reportType === 'subject' && subjectViewMode === 'datewise') ? 'subject_grid' : reportType;

                let url = `/get_reports?class=${cls}&view_type=${effectiveViewType}&date=${dateVal}`;

                const needsTeacher =
                    (effectiveViewType === 'monthly') ||
                    (effectiveViewType === 'daily');
                if (needsTeacher) url += `&teacher=${encodeURIComponent(teacher)}`;

                // Pass subject whenever selected; daily-grid can optionally use it for filtering
                if (subject) {
                    url += `&subject=${encodeURIComponent(subject)}`;
                }

                // =============================
                // FETCH DATA
                // =============================

                const response = await fetch(url, { headers: defaultHeaders });

                if (!response.ok) {
                    throw new Error("Server error while loading report.");
                }

                const data = await response.json();

                // =============================
                // BACKEND ERROR
                // =============================

                if (data.error) {
                    list.innerHTML = `
                    <tr>
                        <td colspan="10" class="text-center text-danger p-5">
                            ${data.error}
                        </td>
                    </tr>`;
                    return;
                }

                // =============================
                // UPDATE HEADER INFO
                // =============================

                document.getElementById('reportHeaderInfo').style.display = 'block';

                if (reportType === "subject") {
                    document.getElementById('displayTeacher').innerText =
                        (subjectViewMode === 'datewise') ? (subject || data.subject_name || '') : (data.subject_name || subject);
                } else {
                    document.getElementById('displayTeacher').innerText =
                        data.teacher_name || teacher;
                }

                // document.getElementById('displayMeta').innerText =
                //     `${reportType.toUpperCase()} | ${cls} | ${dateVal}`;

                let viewLabel;
                if (reportType === 'daily') viewLabel = 'Daily Report';
                else if (reportType === 'monthly') viewLabel = 'Monthly Report';
                else if (reportType === 'subject') viewLabel = 'Subject Report';
                else viewLabel = reportType.toUpperCase();

                document.getElementById('displayMeta').innerText = `${viewLabel} | ${cls} | ${dateVal}`;

                // =============================
                // VALIDATE RECORDS
                // =============================

                if (!Array.isArray(data.records) || data.records.length === 0) {
                    list.innerHTML = `
                    <tr>
                        <td colspan="10" class="text-center text-muted p-5">
                            No records found
                        </td>
                    </tr>`;
                    return;
                }

                let head = "";
                let body = "";

                // ==================================================
                // SUBJECT DATE-WISE (SL + NAME + 1..end + totals)
                // ==================================================
                if (reportType === "subject" && subjectViewMode === "datewise") {
                    // Requires days_header + student.days from the subject report payload.
                    // If Apps Script doesn't provide this yet for subject view, we show a friendly message.
                    const days = Array.isArray(data.days_header) ? data.days_header : [];
                    const gridRecords = Array.isArray(data.records) ? data.records : [];
                    const hasGrid = days.length > 0 && gridRecords.some(r => r && typeof r === 'object' && r.days && typeof r.days === 'object');

                    if (!hasGrid) {
                        list.innerHTML = `
                        <tr>
                            <td colspan="10" class="text-center text-muted p-5">
                                Date-wise subject view needs day-wise data from the report service. Please use Summary view for now.
                            </td>
                        </tr>`;
                        document.querySelector("#viewSection table thead").innerHTML = '';
                        return;
                    }

                    const formatDayLabel = (d) => {
                        const s = (d ?? '').toString().trim();
                        return /^\d{4}-\d{2}-\d{2}$/.test(s) ? s.slice(5) : s;
                    };

                    head = `<tr>
                        <th class="text-white" style="white-space:nowrap;">ཨང་།</th>
                        <th class="text-white" style="min-width:220px;">མཚན་ཐོ།</th>
                    `;
                    days.forEach(day => {
                        head += `<th class="text-white text-center" style="font-size:0.7rem; min-width:34px;">${formatDayLabel(day)}</th>`;
                    });
                    head += `
                        <th class="text-white" style="white-space:nowrap;">ཡོངས་སྡོམ།</th>
                        <th class="bg-success text-white" style="white-space:nowrap;">ཡོད།</th>
                        <th class="bg-danger text-white" style="white-space:nowrap;">ཆ།</th>
                        <th class="bg-warning text-dark" style="white-space:nowrap;">ན།</th>
                        <th class="bg-info text-dark" style="white-space:nowrap;">ཞུ།</th>
                        <th class="text-white" style="white-space:nowrap;">འཕྱིས།</th>
                        <th class="text-white" style="white-space:nowrap;">%</th>
                    </tr>`;

                    const getCell = (val) => {
                        const v = val || "-";
                        const char =
                            v === "Late" ? "L"
                            : v === "-" ? "-"
                            : v.charAt(0);
                        const color =
                            v === "Present" ? "text-success"
                            : v === "Absent" ? "text-danger"
                            : v === "Sick" ? "text-warning"
                            : v === "Leave" ? "text-info"
                            : v === "Late" ? "text-secondary"
                            : "";
                        return `<td class="text-center fw-bold ${color}">${char}</td>`;
                    };

                    let sl = 1;
                    gridRecords.forEach(gridStudent => {
                        const name = gridStudent?.Name || "";

                        // Totals computed from grid
                        const computed = { total: 0, P: 0, A: 0, S: 0, Lv: 0, La: 0 };
                        days.forEach(day => {
                            const v = gridStudent?.days?.[day] || "-";
                            if (!v || v === "-" || v === "—") return;
                            computed.total += 1;
                            if (v === "Present") computed.P += 1;
                            else if (v === "Absent") computed.A += 1;
                            else if (v === "Sick") computed.S += 1;
                            else if (v === "Leave") computed.Lv += 1;
                            else if (v === "Late") computed.La += 1;
                        });

                        const totalClass = computed.total;
                        const present = computed.P;
                        const absent = computed.A;
                        const sick = computed.S;
                        const leave = computed.Lv;
                        const late = computed.La;
                        const pct = totalClass > 0
                            ? (((present + late) / totalClass) * 100).toFixed(1)
                            : 0;

                        body += `<tr>
                            <td class="text-center">${sl++}</td>
                            <td class="fw-bold">${name}</td>
                        `;
                        days.forEach(day => {
                            body += getCell(gridStudent?.days?.[day]);
                        });
                        body += `
                            <td class="text-center fw-bold">${totalClass}</td>
                            <td class="text-center text-success fw-bold">${present}</td>
                            <td class="text-center text-danger fw-bold">${absent}</td>
                            <td class="text-center text-warning fw-bold">${sick}</td>
                            <td class="text-center text-info fw-bold">${leave}</td>
                            <td class="text-center text-secondary fw-bold">${late}</td>
                            <td class="text-center fw-bold ${pct < 75 ? 'text-danger' : ''}">${pct}%</td>
                        </tr>`;
                    });
                }

                // ==================================================
                // MONTHLY + SUBJECT SUMMARY TABLE
                // ==================================================

                if (reportType === "monthly" || (reportType === "subject" && subjectViewMode === "summary")) {

                    head = `
                    <tr>
                        <th class="text-white">ཨང་།</th>
                        <th class="text-white">མཚན་ཐོ།</th>
                        <th class="text-white">ཡོངས་སྡོམ།</th>
                        <th class="bg-success text-white">ཡོད།</th>
                        <th class="bg-danger text-white">ཆ།</th>
                        <th class="bg-warning text-dark">ན།</th>
                        <th class="bg-info text-dark">ཞུ།</th>
                        <th class="text-white">འཕྱིས།</th>
                        <th class="text-white">%</th>
                    </tr>
                    `;

                    data.records.forEach(student => {

                        const sum = student.summary || {};

                        const total = student.total_sessions || 0;
                        const present = sum.P || 0;
                        const late = sum.La || 0;

                        const pct = total > 0
                            ? (((present + late) / total) * 100).toFixed(1)
                            : 0;

                        body += `
                        <tr>
                            <td class="text-center">${student.ID}</td>
                            <td class="fw-bold">${student.Name}</td>
                            <td class="text-center">${total}</td>
                            <td class="text-center text-success fw-bold">${present}</td>
                            <td class="text-center text-danger fw-bold">${sum.A || 0}</td>
                            <td class="text-center text-warning fw-bold">${sum.S || 0}</td>
                            <td class="text-center text-info fw-bold">${sum.L || 0}</td>
                            <td class="text-center text-secondary fw-bold">${late}</td>
                            <td class="text-center fw-bold ${pct < 75 ? 'text-danger' : ''}">
                                ${pct}%
                            </td>
                        </tr>
                        `;
                    });
                }

                // ==================================================
                // DAILY TABLE
                // ==================================================

                if (reportType === "daily") {

                    const days = Array.isArray(data.days_header) ? data.days_header : [];

                    head = `
                    <tr>
                        <th class="text-white">ཨང་།</th>
                        <th class="text-white">མཚན་ཐོ།</th>
                    `;

                    days.forEach(day => {
                        head += `<th class="text-white" style="font-size:0.7rem">${day}</th>`;
                    });

                    head += `</tr>`;

                    data.records.forEach(student => {

                        body += `<tr>
                        <td class="text-center">${student.ID}</td>
                        <td class="fw-bold">${student.Name}</td>`;

                        days.forEach(day => {

                            const val = student.days?.[day] || "-";

                            const char =
                                val === "Late" ? "T"
                                : val === "-" ? "-"
                                : val.charAt(0);

                            let color =
                                val === "Present" ? "text-success"
                                : val === "Absent" ? "text-danger"
                                : val === "Sick" ? "text-warning"
                                : val === "Leave" ? "text-info"
                                : val === "Late" ? "text-secondary"
                                : "";

                            body += `<td class="text-center fw-bold ${color}">
                                ${char}
                            </td>`;
                        });

                        body += `</tr>`;
                    });
                }

                // =============================
                // RENDER TABLE
                // =============================

                document.querySelector("#viewSection table thead").innerHTML = head;
                list.innerHTML = body;

            } catch (error) {

                console.error("Report load error:", error);

                list.innerHTML = `
                <tr>
                    <td colspan="10" class="text-center text-danger p-5">
                        Failed to load report. Please try again.
                    </td>
                </tr>`;
            }
        }
    </script>
</body>
</html>
